# .github/workflows/release.yml
name: goreleaser

on:
  pull_request:
  push:
    # run only against tags
    tags:
      - "*"

permissions:
  contents: write
  # packages: write
  # issues: write
  # id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Extract version from tag (remove 'refs/tags/' prefix and 'v' prefix if present)
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Setting release version: $VERSION"
          # Update version.go to remove +src suffix
          sed -i 's/var Version = ".*"/var Version = "'"$VERSION"'"/' version.go
          cat version.go

      - name: Commit release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.go
          git commit -m "chore: set version to ${{ env.RELEASE_VERSION }} for release"
          # Find the branch that contains this tag and push to it
          BRANCH=$(git branch -r --contains HEAD | grep -E 'origin/(main|master)$' | head -1 | sed 's/origin\///' || echo "main")
          git push origin HEAD:${BRANCH}
          # Move the tag to the new commit so GoReleaser builds from the versioned commit
          TAG=${GITHUB_REF#refs/tags/}
          git tag -fa "$TAG" -m "Release $TAG"
          git push origin "$TAG" --force

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Your GoReleaser Pro key, if you are using the 'goreleaser-pro' distribution
          # GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Bump to next dev version
        if: startsWith(github.ref, 'refs/tags/') && success()
        run: |
          # Parse current version (format: major.minor.patch)
          CURRENT_VERSION=${{ env.RELEASE_VERSION }}
          # Extract parts
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          # Increment minor version
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}.0+src"
          echo "Bumping to next dev version: $NEW_VERSION"
          # Update version.go
          sed -i 's/var Version = ".*"/var Version = "'"$NEW_VERSION"'"/' version.go
          cat version.go

      - name: Commit next dev version
        if: startsWith(github.ref, 'refs/tags/') && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Switch back to the branch (we were on the tag)
          BRANCH=$(git branch -r --contains HEAD | grep -E 'origin/(main|master)$' | head -1 | sed 's/origin\///' || echo "main")
          git checkout ${BRANCH}
          git pull origin ${BRANCH} --rebase || true
          git add version.go
          git commit -m "chore: bump to next dev version"
          git push origin ${BRANCH}
